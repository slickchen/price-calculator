<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRE 计价器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f0f;
            --card: #1a1a2e;
            --card2: #16213e;
            --accent: #e94560;
            --accent2: #0f3460;
            --green: #00d2d3;
            --gold: #feca57;
            --text: #eee;
            --text2: #aaa;
            --danger: #ff6b6b;
            --radius: 12px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header .subtitle { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .header .online-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .session-bar {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        .session-bar select {
            flex: 1;
            min-width: 120px;
            background: var(--card2);
            color: var(--text);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
        }
        .session-bar .session-name {
            font-size: 14px;
            color: var(--green);
        }
        
        .btn {
            border: none;
            border-radius: var(--radius);
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--accent2); color: var(--text); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 8px; }
        .btn-xs { padding: 4px 8px; font-size: 11px; border-radius: 6px; }
        
        .discount-bar {
            background: var(--card2);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #333;
        }
        .discount-bar label { font-size: 13px; color: var(--text2); }
        .discount-bar input {
            width: 50px;
            background: var(--card);
            color: var(--gold);
            border: 1px solid #555;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 14px;
            text-align: center;
        }
        .discount-bar .apply-btn {
            background: var(--accent2);
            color: var(--text);
            border: none;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .toolbar {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .toolbar input {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 15px;
        }
        
        .person-card {
            background: var(--card);
            margin: 8px 16px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid #333;
        }
        .person-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            gap: 10px;
        }
        .person-header .name {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
        }
        .person-header .total {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }
        .person-header .toggle {
            font-size: 14px;
            color: var(--text2);
            transition: transform 0.2s;
        }
        .person-header .toggle.open { transform: rotate(180deg); }
        
        .person-body {
            display: none;
            padding: 0 16px 16px;
        }
        .person-body.open { display: block; }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            margin: 10px 0 6px;
        }
        
        .fee-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .fee-tag {
            background: var(--accent2);
            color: var(--green);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fee-tag .del {
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
        }
        .extra-tag {
            background: #2d1b4e;
            color: var(--gold);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .extra-tag .del {
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
        }
        
        .add-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .add-row input {
            flex: 1;
            background: var(--card2);
            color: var(--text);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
        }
        .add-row input.small { width: 70px; flex: none; }
        
        .subtotal {
            font-size: 13px;
            color: var(--text2);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #444;
        }
        .subtotal span { color: var(--green); font-weight: 600; }
        .subtotal .gold { color: var(--gold); }
        
        .total-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top: 2px solid var(--accent);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .total-bar .label { font-size: 14px; color: var(--text2); }
        .total-bar .amount {
            flex: 1;
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
            text-align: center;
        }
        .total-bar .btn { margin-left: 6px; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal h2 { margin-bottom: 16px; }
        .modal pre {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--green);
            background: var(--bg);
            padding: 16px;
            border-radius: 8px;
        }
        .modal .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal .modal-btns .btn { flex: 1; }
        
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }
        
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--green);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.warn { background: var(--gold); }
        .toast.error { background: var(--danger); color: #fff; }
        
        /* 新建会话弹窗 */
        .new-session-form {
            display: none;
            padding: 12px 16px;
            gap: 8px;
            background: var(--card2);
            border-bottom: 1px solid #333;
        }
        .new-session-form.open { display: flex; }
        .new-session-form input {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 8px 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><span class="online-dot" id="onlineDot"></span>TRE 计价器</h1>
        <div class="subtitle">多人实时同步 · 卡钟折扣 · 自动保存</div>
    </div>

    <div class="session-bar">
        <select id="sessionSelect" onchange="loadSession()">
            <option value="">-- 选择会话 --</option>
        </select>
        <button class="btn btn-sm btn-blue" onclick="showNewSession()">新建</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSession()">删除</button>
        <button class="btn btn-sm btn-gold" onclick="resetSession()">重置</button>
    </div>

    <div class="new-session-form" id="newSessionForm">
        <input type="text" id="newSessionName" placeholder="会话名称（如：2026-06-08）"
               onkeydown="if(event.key==='Enter')createSession()">
        <button class="btn btn-sm btn-green" onclick="createSession()">创建</button>
        <button class="btn btn-sm btn-danger" onclick="hideNewSession()">取消</button>
    </div>

    <div class="discount-bar" id="discountBar" style="display:none">
        <label>卡钟折扣：</label>
        <input type="number" id="discountInput" value="75" min="1" max="100">
        <span>%</span>
        <button class="apply-btn" onclick="setDiscount()">应用</button>
    </div>

    <div class="toolbar" id="addPersonBar" style="display:none">
        <input type="text" id="newPersonName" placeholder="输入客户姓名"
               onkeydown="if(event.key==='Enter')addPerson()">
        <button class="btn btn-primary" onclick="addPerson()">添加客户</button>
    </div>

    <div id="personList"></div>

    <div class="total-bar" id="totalBar" style="display:none">
        <div class="label">总计</div>
        <div class="amount" id="grandTotal">¥0</div>
        <button class="btn btn-sm btn-green" onclick="showReceipt()">📋账单</button>
    </div>

    <div class="modal-overlay" id="receiptModal">
        <div class="modal">
            <h2>📋 账单</h2>
            <pre id="receiptText"></pre>
            <div class="modal-btns">
                <button class="btn btn-green" onclick="copyReceipt()">复制</button>
                <button class="btn btn-blue" onclick="closeReceipt()">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script>
let currentSessionId = null;
let currentData = null;
let pollTimer = null;
let lastUpdatedAt = '';

// Toast
function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.className = 'toast', 2000);
}

// 在线状态
function setOnline(online) {
    const dot = document.getElementById('onlineDot');
    dot.style.background = online ? 'var(--green)' : 'var(--danger)';
}

// 页面加载
window.onload = () => {
    refreshSessionList();
    // 轮询同步：每2秒检查更新
    pollTimer = setInterval(pollUpdate, 2000);
};

// 轮询检查数据变化（轻量：其他人改了数据会自动同步）
async function pollUpdate() {
    if (!currentSessionId) return;
    try {
        const res = await fetch(`/api/sessions/${currentSessionId}`);
        if (!res.ok) return;
        const data = await res.json();
        // 只在数据有变化时才更新UI
        if (data.updated_at !== lastUpdatedAt) {
            lastUpdatedAt = data.updated_at;
            currentData = data;
            renderData(data);
        }
        setOnline(true);
    } catch(e) {
        setOnline(false);
    }
}

// 会话列表
async function refreshSessionList() {
    try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const sel = document.getElementById('sessionSelect');
        sel.innerHTML = '<option value="">-- 选择会话 --</option>';
        sessions.forEach(s => {
            sel.innerHTML += `<option value="${s.id}">${s.name} (${s.person_count}人 ¥${s.grand_total})</option>`;
        });
        if (currentSessionId) sel.value = currentSessionId;
        setOnline(true);
    } catch(e) {
        setOnline(false);
    }
}

function showNewSession() {
    const form = document.getElementById('newSessionForm');
    form.classList.add('open');
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('newSessionName').value = today;
    document.getElementById('newSessionName').focus();
}
function hideNewSession() {
    document.getElementById('newSessionForm').classList.remove('open');
}

async function createSession() {
    const name = document.getElementById('newSessionName').value.trim();
    if (!name) return;
    const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name})
    });
    const data = await res.json();
    currentSessionId = data.id;
    currentData = data;
    lastUpdatedAt = data.updated_at;
    hideNewSession();
    await refreshSessionList();
    renderData(data);
    toast('会话已创建');
}

async function loadSession() {
    const sel = document.getElementById('sessionSelect');
    currentSessionId = sel.value;
    if (!currentSessionId) {
        document.getElementById('personList').innerHTML = '';
        document.getElementById('totalBar').style.display = 'none';
        document.getElementById('discountBar').style.display = 'none';
        document.getElementById('addPersonBar').style.display = 'none';
        return;
    }
    const res = await fetch(`/api/sessions/${currentSessionId}`);
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
}

async function deleteSession() {
    if (!currentSessionId) return;
    if (!confirm('确定删除此会话？数据无法恢复！')) return;
    await fetch(`/api/sessions/${currentSessionId}`, {method:'DELETE'});
    currentSessionId = null;
    currentData = null;
    await refreshSessionList();
    document.getElementById('personList').innerHTML = '';
    document.getElementById('totalBar').style.display = 'none';
    document.getElementById('discountBar').style.display = 'none';
    document.getElementById('addPersonBar').style.display = 'none';
    toast('会话已删除');
}

async function resetSession() {
    if (!currentSessionId) return;
    if (!confirm('确定重置？所有客户和数据将被清空，方便下一次计算！')) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/reset`, {method:'POST'});
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    toast('已重置，可以开始新计算！', 'warn');
}

// 渲染
function renderData(data) {
    document.getElementById('discountInput').value = Math.round(data.discount * 100);
    document.getElementById('discountBar').style.display = 'flex';
    document.getElementById('addPersonBar').style.display = 'flex';
    document.getElementById('totalBar').style.display = 'flex';
    document.getElementById('grandTotal').textContent = `¥${data.grand_total}`;

    const list = document.getElementById('personList');
    if (!data.persons || data.persons.length === 0) {
        list.innerHTML = '<div class="empty"><div class="icon">👤</div>添加客户开始计价</div>';
        return;
    }

    const discountPct = Math.round(data.discount * 100);
    list.innerHTML = data.persons.map((p, i) => `
        <div class="person-card">
            <div class="person-header" onclick="togglePerson(${p.id})">
                <span class="name">${esc(p.name)}</span>
                <span class="total">¥${p.total}</span>
                <span class="toggle" id="toggle-${p.id}">▼</span>
            </div>
            <div class="person-body" id="body-${p.id}">
                <div class="section-title">🕐 卡钟费用（${discountPct}%折扣）</div>
                <div class="fee-tags">
                    ${p.clock_fees.map(c => `
                        <span class="fee-tag">${c.fee}<span class="del" onclick="removeClock(${p.id},${c.id})">✕</span></span>
                    `).join('')}
                </div>
                <div class="add-row">
                    <input type="number" id="clock-input-${p.id}" placeholder="金额" step="0.01"
                           onkeydown="if(event.key==='Enter')addClock(${p.id})">
                    <button class="btn btn-sm btn-green" onclick="addClock(${p.id})">添加</button>
                </div>
                <div class="subtotal">
                    卡钟合计：<span>¥${p.clock_total}</span> → ${discountPct}%折：<span class="gold">¥${p.clock_discounted}</span>
                </div>

                <div class="section-title">🍺 额外消费（原价）</div>
                <div class="fee-tags">
                    ${p.extra_items.map(e => `
                        <span class="extra-tag">${esc(e.name)} ¥${e.price}<span class="del" onclick="removeExtra(${p.id},${e.id})">✕</span></span>
                    `).join('')}
                </div>
                <div class="add-row">
                    <input type="text" id="extra-name-${p.id}" placeholder="名称" style="flex:1">
                    <input type="number" id="extra-price-${p.id}" placeholder="金额" class="small" step="0.01"
                           onkeydown="if(event.key==='Enter')addExtra(${p.id})">
                    <button class="btn btn-sm btn-gold" onclick="addExtra(${p.id})">添加</button>
                </div>
                ${p.extra_items.length ? `<div class="subtotal">额外小计：<span class="gold">¥${p.extra_total}</span></div>` : ''}

                <div style="margin-top:12px;text-align:right">
                    <button class="btn btn-sm btn-danger" onclick="removePerson(${p.id})">删除 ${esc(p.name)}</button>
                </div>
            </div>
        </div>
    `).join('');
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function togglePerson(pid) {
    const body = document.getElementById(`body-${pid}`);
    const toggle = document.getElementById(`toggle-${pid}`);
    body.classList.toggle('open');
    toggle.classList.toggle('open');
}

async function setDiscount() {
    if (!currentSessionId) return;
    const val = parseInt(document.getElementById('discountInput').value);
    const res = await fetch(`/api/sessions/${currentSessionId}/discount`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({discount: val})
    });
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
}

async function addPerson() {
    if (!currentSessionId) return;
    const name = document.getElementById('newPersonName').value.trim();
    if (!name) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name})
    });
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    document.getElementById('newPersonName').value = '';
    await refreshSessionList();
}

async function removePerson(pid) {
    if (!confirm('确定删除此客户？')) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}`, {method:'DELETE'});
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function addClock(pid) {
    const input = document.getElementById(`clock-input-${pid}`);
    const fee = parseFloat(input.value);
    if (!fee || fee <= 0) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/clock`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({fee})
    });
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function removeClock(pid, cid) {
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/clock/${cid}`, {method:'DELETE'});
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function addExtra(pid) {
    const name = document.getElementById(`extra-name-${pid}`).value.trim();
    const price = parseFloat(document.getElementById(`extra-price-${pid}`).value);
    if (!name || !price || price <= 0) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/extra`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, price})
    });
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function removeExtra(pid, eid) {
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/extra/${eid}`, {method:'DELETE'});
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function showReceipt() {
    if (!currentSessionId) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/receipt`);
    const data = await res.json();
    document.getElementById('receiptText').textContent = data.receipt;
    document.getElementById('receiptModal').classList.add('open');
}

function closeReceipt() {
    document.getElementById('receiptModal').classList.remove('open');
}

function copyReceipt() {
    const text = document.getElementById('receiptText').textContent;
    navigator.clipboard.writeText(text).then(() => toast('已复制到剪贴板'));
}
</script>

</body>
</html>
