<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRE 计价器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f0f;
            --card: #1a1a2e;
            --card2: #16213e;
            --accent: #e94560;
            --accent2: #0f3460;
            --green: #00d2d3;
            --gold: #feca57;
            --text: #eee;
            --text2: #aaa;
            --danger: #ff6b6b;
            --radius: 12px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* 顶部标题 */
        .header {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header .subtitle { font-size: 12px; color: var(--text2); margin-top: 4px; }
        
        /* 会话信息栏 */
        .session-bar {
            background: var(--card);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }
        .session-bar .session-name {
            flex: 1;
            font-size: 14px;
            color: var(--green);
        }
        .session-bar select {
            background: var(--card2);
            color: var(--text);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
        }
        
        /* 折扣设置 */
        .discount-bar {
            background: var(--card2);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #333;
        }
        .discount-bar label { font-size: 13px; color: var(--text2); }
        .discount-bar input {
            width: 50px;
            background: var(--card);
            color: var(--gold);
            border: 1px solid #555;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 14px;
            text-align: center;
        }
        .discount-bar .apply-btn {
            background: var(--accent2);
            color: var(--text);
            border: none;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
        }
        
        /* 添加客户 */
        .add-person {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
        }
        .add-person input {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 15px;
        }
        
        /* 通用按钮 */
        .btn {
            border: none;
            border-radius: var(--radius);
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--accent2); color: var(--text); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-sm { padding: 6px 10px; font-size: 12px; border-radius: 8px; }
        
        /* 客户卡片 */
        .person-card {
            background: var(--card);
            margin: 8px 16px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid #333;
        }
        .person-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            gap: 10px;
        }
        .person-header .name {
            flex: 1;
            font-size: 17px;
            font-weight: 700;
        }
        .person-header .total {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }
        .person-header .toggle {
            font-size: 14px;
            color: var(--text2);
            transition: transform 0.2s;
        }
        .person-header .toggle.open { transform: rotate(180deg); }
        
        .person-body {
            display: none;
            padding: 0 16px 16px;
        }
        .person-body.open { display: block; }
        
        /* 区块标题 */
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            margin: 10px 0 6px;
            text-transform: uppercase;
        }
        
        /* 费用标签 */
        .fee-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .fee-tag {
            background: var(--accent2);
            color: var(--green);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fee-tag .del {
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
        }
        .extra-tag {
            background: #2d1b4e;
            color: var(--gold);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .extra-tag .del {
            color: var(--danger);
            cursor: pointer;
            font-size: 12px;
        }
        
        /* 添加行 */
        .add-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .add-row input {
            flex: 1;
            background: var(--card2);
            color: var(--text);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
        }
        .add-row input.small { width: 70px; flex: none; }
        
        /* 小计行 */
        .subtotal {
            font-size: 13px;
            color: var(--text2);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #444;
        }
        .subtotal span { color: var(--green); font-weight: 600; }
        .subtotal .gold { color: var(--gold); }
        
        /* 底部总计 */
        .total-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top: 2px solid var(--accent);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .total-bar .label { font-size: 14px; color: var(--text2); }
        .total-bar .amount {
            flex: 1;
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
            text-align: center;
        }
        .total-bar .receipt-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* 账单弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal h2 { margin-bottom: 16px; }
        .modal pre {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--green);
            background: var(--bg);
            padding: 16px;
            border-radius: 8px;
        }
        .modal .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .modal .modal-btns .btn { flex: 1; }
        
        /* 空状态 */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }
        
        /* 新建会话弹窗 */
        .new-session-form {
            display: flex;
            gap: 8px;
            padding: 0 16px 8px;
        }
        .new-session-form input {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 8px 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 顶部 -->
    <div class="header">
        <h1>TRE 计价器</h1>
        <div class="subtitle">卡钟75折 · 额外消费原价 · 自动保存</div>
    </div>

    <!-- 会话栏 -->
    <div class="session-bar">
        <select id="sessionSelect" onchange="loadSession()">
            <option value="">-- 选择会话 --</option>
        </select>
        <div class="session-name" id="sessionName"></div>
        <button class="btn btn-sm btn-blue" onclick="showNewSession()">新建</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSession()">删除</button>
    </div>

    <!-- 新建会话 -->
    <div class="new-session-form" id="newSessionForm" style="display:none">
        <input type="text" id="newSessionName" placeholder="会话名称（如：2026-06-08）">
        <button class="btn btn-sm btn-green" onclick="createSession()">创建</button>
        <button class="btn btn-sm btn-danger" onclick="hideNewSession()">取消</button>
    </div>

    <!-- 折扣 -->
    <div class="discount-bar" id="discountBar" style="display:none">
        <label>卡钟折扣：</label>
        <input type="number" id="discountInput" value="75" min="1" max="100">
        <span>%</span>
        <button class="apply-btn" onclick="setDiscount()">应用</button>
    </div>

    <!-- 添加客户 -->
    <div class="add-person" id="addPersonBar" style="display:none">
        <input type="text" id="newPersonName" placeholder="输入姓名" 
               onkeydown="if(event.key==='Enter')addPerson()">
        <button class="btn btn-primary" onclick="addPerson()">添加客户</button>
    </div>

    <!-- 客户列表 -->
    <div id="personList"></div>

    <!-- 底部总计 -->
    <div class="total-bar" id="totalBar" style="display:none">
        <div class="label">总计</div>
        <div class="amount" id="grandTotal">¥0</div>
        <button class="receipt-btn" onclick="showReceipt()">账单</button>
    </div>

    <!-- 账单弹窗 -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal">
            <h2>📋 账单</h2>
            <pre id="receiptText"></pre>
            <div class="modal-btns">
                <button class="btn btn-green" onclick="copyReceipt()">复制</button>
                <button class="btn btn-blue" onclick="closeReceipt()">关闭</button>
            </div>
        </div>
    </div>

<script>
let currentSessionId = null;

// 页面加载
window.onload = () => refreshSessionList();

// 会话列表
async function refreshSessionList() {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    const sel = document.getElementById('sessionSelect');
    sel.innerHTML = '<option value="">-- 选择会话 --</option>';
    sessions.forEach(s => {
        sel.innerHTML += `<option value="${s.filename.replace('.json','')}">${s.name} (${s.person_count}人 ¥${s.grand_total})</option>`;
    });
    if (currentSessionId) sel.value = currentSessionId;
}

function showNewSession() {
    document.getElementById('newSessionForm').style.display = 'flex';
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('newSessionName').value = today;
    document.getElementById('newSessionName').focus();
}
function hideNewSession() {
    document.getElementById('newSessionForm').style.display = 'none';
}

async function createSession() {
    const name = document.getElementById('newSessionName').value.trim();
    if (!name) return;
    const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name})
    });
    const data = await res.json();
    currentSessionId = data.id;
    hideNewSession();
    await refreshSessionList();
    await renderSession();
}

async function loadSession() {
    const sel = document.getElementById('sessionSelect');
    currentSessionId = sel.value;
    if (currentSessionId) await renderSession();
    else {
        document.getElementById('personList').innerHTML = '';
        document.getElementById('totalBar').style.display = 'none';
        document.getElementById('discountBar').style.display = 'none';
        document.getElementById('addPersonBar').style.display = 'none';
    }
}

async function deleteSession() {
    if (!currentSessionId) return;
    if (!confirm('确定删除此会话？')) return;
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}`, {method:'DELETE'});
    currentSessionId = null;
    await refreshSessionList();
    document.getElementById('personList').innerHTML = '';
    document.getElementById('totalBar').style.display = 'none';
}

// 渲染会话
async function renderSession() {
    if (!currentSessionId) return;
    const res = await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}`);
    const data = await res.json();
    
    document.getElementById('sessionName').textContent = data.name;
    document.getElementById('discountInput').value = Math.round(data.discount * 100);
    document.getElementById('discountBar').style.display = 'flex';
    document.getElementById('addPersonBar').style.display = 'flex';
    document.getElementById('totalBar').style.display = 'flex';
    document.getElementById('grandTotal').textContent = `¥${data.grand_total}`;
    
    const list = document.getElementById('personList');
    if (data.persons.length === 0) {
        list.innerHTML = '<div class="empty"><div class="icon">👤</div>添加客户开始计价</div>';
        return;
    }
    
    const discountPct = Math.round(data.discount * 100);
    list.innerHTML = data.persons.map((p, i) => `
        <div class="person-card">
            <div class="person-header" onclick="togglePerson(${i})">
                <span class="name">${p.name}</span>
                <span class="total">¥${p.total}</span>
                <span class="toggle" id="toggle-${i}">▼</span>
            </div>
            <div class="person-body" id="body-${i}">
                <!-- 卡钟 -->
                <div class="section-title">🕐 卡钟费用（${discountPct}%折扣）</div>
                <div class="fee-tags">
                    ${p.clock_fees.map((f, j) => `
                        <span class="fee-tag">${f}<span class="del" onclick="removeClock(${i},${j})">✕</span></span>
                    `).join('')}
                </div>
                <div class="add-row">
                    <input type="number" id="clock-input-${i}" placeholder="金额" step="0.01"
                           onkeydown="if(event.key==='Enter')addClock(${i})">
                    <button class="btn btn-sm btn-green" onclick="addClock(${i})">添加</button>
                </div>
                <div class="subtotal">
                    卡钟合计：<span>¥${p.clock_total}</span> → ${discountPct}%折：<span class="gold">¥${p.clock_discounted}</span>
                </div>
                
                <!-- 额外消费 -->
                <div class="section-title">🍺 额外消费（原价）</div>
                <div class="fee-tags">
                    ${p.extra_items.map((e, j) => `
                        <span class="extra-tag">${e.name} ¥${e.price}<span class="del" onclick="removeExtra(${i},${j})">✕</span></span>
                    `).join('')}
                </div>
                <div class="add-row">
                    <input type="text" id="extra-name-${i}" placeholder="名称" style="flex:1">
                    <input type="number" id="extra-price-${i}" placeholder="金额" class="small" step="0.01"
                           onkeydown="if(event.key==='Enter')addExtra(${i})">
                    <button class="btn btn-sm btn-gold" onclick="addExtra(${i})">添加</button>
                </div>
                ${p.extra_items.length ? `<div class="subtotal">额外小计：<span class="gold">¥${p.extra_total}</span></div>` : ''}
                
                <!-- 删除客户 -->
                <div style="margin-top:12px;text-align:right">
                    <button class="btn btn-sm btn-danger" onclick="removePerson(${i})">删除 ${p.name}</button>
                </div>
            </div>
        </div>
    `).join('');
}

// 展开/收起
function togglePerson(idx) {
    const body = document.getElementById(`body-${idx}`);
    const toggle = document.getElementById(`toggle-${idx}`);
    body.classList.toggle('open');
    toggle.classList.toggle('open');
}

// 折扣
async function setDiscount() {
    if (!currentSessionId) return;
    const val = parseInt(document.getElementById('discountInput').value);
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/discount`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({discount: val})
    });
    await renderSession();
}

// 添加客户
async function addPerson() {
    if (!currentSessionId) return;
    const name = document.getElementById('newPersonName').value.trim();
    if (!name) return;
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/persons`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name})
    });
    document.getElementById('newPersonName').value = '';
    await renderSession();
}

async function removePerson(idx) {
    if (!confirm('确定删除此客户？')) return;
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/persons/${idx}`, {method:'DELETE'});
    await renderSession();
}

// 卡钟
async function addClock(personIdx) {
    const input = document.getElementById(`clock-input-${personIdx}`);
    const fee = parseFloat(input.value);
    if (!fee || fee <= 0) return;
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/persons/${personIdx}/clock`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({fee})
    });
    await renderSession();
}

async function removeClock(personIdx, clockIdx) {
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/persons/${personIdx}/clock/${clockIdx}`, {method:'DELETE'});
    await renderSession();
}

// 额外消费
async function addExtra(personIdx) {
    const name = document.getElementById(`extra-name-${personIdx}`).value.trim();
    const price = parseFloat(document.getElementById(`extra-price-${personIdx}`).value);
    if (!name || !price || price <= 0) return;
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/persons/${personIdx}/extra`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, price})
    });
    await renderSession();
}

async function removeExtra(personIdx, extraIdx) {
    await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/persons/${personIdx}/extra/${extraIdx}`, {method:'DELETE'});
    await renderSession();
}

// 账单
async function showReceipt() {
    if (!currentSessionId) return;
    const res = await fetch(`/api/sessions/${encodeURIComponent(currentSessionId)}/receipt`);
    const data = await res.json();
    document.getElementById('receiptText').textContent = data.receipt;
    document.getElementById('receiptModal').classList.add('open');
}

function closeReceipt() {
    document.getElementById('receiptModal').classList.remove('open');
}

function copyReceipt() {
    const text = document.getElementById('receiptText').textContent;
    navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
}
</script>

</body>
</html>
