<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRE 计价器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f0f;
            --card: #1a1a2e;
            --card2: #16213e;
            --accent: #e94560;
            --accent2: #0f3460;
            --green: #00d2d3;
            --gold: #feca57;
            --text: #eee;
            --text2: #aaa;
            --danger: #ff6b6b;
            --radius: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            padding: 16px;
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 20px; font-weight: 700; }
        .header .subtitle { font-size: 11px; color: var(--text2); margin-top: 4px; }
        .header .online-dot {
            display: inline-block; width: 8px; height: 8px;
            background: var(--green); border-radius: 50%;
            margin-right: 4px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* 工具栏 */
        .toolbar-row {
            background: var(--card);
            padding: 8px 12px;
            display: flex; align-items: center; gap: 6px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }
        .toolbar-row select {
            flex: 1; min-width: 100px;
            background: var(--card2); color: var(--text);
            border: 1px solid #444; border-radius: 8px;
            padding: 7px 8px; font-size: 13px;
        }
        .btn {
            border: none; border-radius: var(--radius);
            padding: 7px 12px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--accent2); color: var(--text); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-sm { padding: 5px 9px; font-size: 11px; border-radius: 8px; }
        .btn-outline { background: transparent; border: 1px solid var(--accent2); color: var(--text); }

        /* 折扣栏 */
        .discount-bar {
            background: var(--card2);
            padding: 8px 12px;
            display: flex; align-items: center; gap: 6px;
            border-bottom: 1px solid #333; flex-wrap: wrap;
        }
        .discount-bar label { font-size: 13px; color: var(--text2); }
        .discount-chips {
            display: flex; gap: 4px; flex-wrap: wrap;
        }
        .discount-chip {
            background: var(--accent2); color: var(--text);
            border: 1px solid #444; border-radius: 16px;
            padding: 4px 12px; font-size: 13px; cursor: pointer;
            transition: all 0.2s;
        }
        .discount-chip.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .discount-custom {
            display: flex; align-items: center; gap: 4px; margin-left: 4px;
        }
        .discount-custom input {
            width: 48px; background: var(--card); color: var(--gold);
            border: 1px solid #555; border-radius: 6px;
            padding: 4px 6px; font-size: 14px; text-align: center;
        }
        .discount-custom .apply-btn {
            background: var(--accent2); color: var(--text);
            border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
        }

        /* 添加客户 */
        .add-person-bar {
            padding: 8px 12px;
            display: flex; gap: 6px; align-items: center;
            border-bottom: 1px solid #222;
        }
        .add-person-bar input {
            flex: 1; background: var(--card); color: var(--text);
            border: 1px solid #444; border-radius: var(--radius);
            padding: 10px 14px; font-size: 15px;
        }

        /* 客户卡片 */
        .person-card {
            background: var(--card);
            margin: 6px 12px;
            border-radius: var(--radius);
            overflow: hidden; border: 1px solid #333;
        }
        .person-header {
            display: flex; align-items: center;
            padding: 10px 14px; cursor: pointer; gap: 8px;
        }
        .person-header .name { flex: 1; font-size: 16px; font-weight: 700; }
        .person-header .total { font-size: 17px; font-weight: 700; color: var(--gold); }
        .person-header .toggle { font-size: 13px; color: var(--text2); transition: transform 0.2s; }
        .person-header .toggle.open { transform: rotate(180deg); }
        .person-body { display: none; padding: 0 14px 14px; }
        .person-body.open { display: block; }
        .section-title { font-size: 12px; font-weight: 600; color: var(--text2); margin: 8px 0 5px; }
        .fee-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
        .fee-tag {
            background: var(--accent2); color: var(--green);
            border-radius: 8px; padding: 3px 9px; font-size: 13px;
            display: flex; align-items: center; gap: 5px;
        }
        .fee-tag .del { color: var(--danger); cursor: pointer; font-size: 11px; }
        .extra-tag {
            background: #2d1b4e; color: var(--gold);
            border-radius: 8px; padding: 3px 9px; font-size: 12px;
            display: flex; align-items: center; gap: 5px;
        }
        .extra-tag .del { color: var(--danger); cursor: pointer; font-size: 11px; }
        .add-row { display: flex; gap: 5px; margin-top: 5px; }
        .add-row input {
            flex: 1; background: var(--card2); color: var(--text);
            border: 1px solid #444; border-radius: 8px; padding: 5px 9px; font-size: 13px;
        }
        .add-row input.small { width: 65px; flex: none; }
        .subtotal {
            font-size: 12px; color: var(--text2);
            margin-top: 6px; padding-top: 6px; border-top: 1px dashed #444;
        }
        .subtotal span { color: var(--green); font-weight: 600; }
        .subtotal .gold { color: var(--gold); }

        /* 底部总计 */
        .total-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-top: 2px solid var(--accent);
            padding: 10px 12px;
            display: flex; align-items: center; z-index: 100; gap: 6px;
        }
        .total-bar .label { font-size: 13px; color: var(--text2); }
        .total-bar .amount {
            flex: 1; font-size: 26px; font-weight: 800; color: var(--gold); text-align: center;
        }

        /* 弹窗 */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--card); border-radius: var(--radius);
            width: 92%; max-width: 500px; max-height: 80vh;
            overflow-y: auto; padding: 18px;
        }
        .modal h2 { margin-bottom: 14px; font-size: 18px; }
        .modal pre {
            font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.5;
            white-space: pre-wrap; color: var(--green);
            background: var(--bg); padding: 14px; border-radius: 8px;
        }
        .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
        .modal-btns .btn { flex: 1; }

        /* 快照列表 */
        .snap-item {
            background: var(--card2); border-radius: 10px;
            padding: 10px 14px; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .snap-item .snap-info { flex: 1; }
        .snap-item .snap-label { font-size: 14px; font-weight: 600; }
        .snap-item .snap-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
        .snap-item .snap-total { font-size: 16px; font-weight: 700; color: var(--gold); }

        .empty { text-align: center; padding: 30px 16px; color: var(--text2); }
        .empty .icon { font-size: 40px; margin-bottom: 10px; }

        /* Toast */
        .toast {
            position: fixed; top: 70px; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--green); color: #000;
            padding: 7px 18px; border-radius: 20px;
            font-size: 13px; font-weight: 600;
            opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.warn { background: var(--gold); }
        .toast.error { background: var(--danger); color: #fff; }

        /* 新建会话 */
        .new-session-form {
            display: none; padding: 10px 12px; gap: 6px;
            background: var(--card2); border-bottom: 1px solid #333;
        }
        .new-session-form.open { display: flex; }
        .new-session-form input {
            flex: 1; background: var(--card); color: var(--text);
            border: 1px solid #444; border-radius: var(--radius);
            padding: 8px 12px; font-size: 14px;
        }

        /* 保存快照输入 */
        .save-snap-row {
            display: flex; gap: 6px; margin-bottom: 14px;
        }
        .save-snap-row input {
            flex: 1; background: var(--card2); color: var(--text);
            border: 1px solid #444; border-radius: 8px; padding: 7px 10px; font-size: 13px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1><span class="online-dot" id="onlineDot"></span>TRE 计价器</h1>
    <div class="subtitle">多人实时同步 · 自定义折扣 · 快照备份</div>
</div>

<!-- 会话选择 + 操作 -->
<div class="toolbar-row">
    <select id="sessionSelect" onchange="loadSession()">
        <option value="">-- 选择会话 --</option>
    </select>
    <button class="btn btn-sm btn-blue" onclick="showNewSession()">新建</button>
    <button class="btn btn-sm btn-gold" onclick="showSnapshots()">📁历史</button>
    <button class="btn btn-sm btn-green" onclick="saveSnapshot()">💾保存</button>
    <button class="btn btn-sm btn-danger" onclick="resetSession()">🔄重置</button>
    <button class="btn btn-sm btn-outline" id="restoreBtn" style="display:none" onclick="restoreBackup()">↩️恢复</button>
    <button class="btn btn-sm btn-danger" onclick="deleteSession()">🗑️</button>
</div>

<div class="new-session-form" id="newSessionForm">
    <input type="text" id="newSessionName" placeholder="会话名称"
           onkeydown="if(event.key==='Enter')createSession()">
    <button class="btn btn-sm btn-green" onclick="createSession()">创建</button>
    <button class="btn btn-sm btn-danger" onclick="hideNewSession()">取消</button>
</div>

<!-- 折扣选择 -->
<div class="discount-bar" id="discountBar" style="display:none">
    <label>卡钟折扣：</label>
    <div class="discount-chips" id="discountChips"></div>
    <div class="discount-custom">
        <input type="number" id="discountInput" value="75" min="1" max="100">
        <span style="font-size:13px">%</span>
        <button class="apply-btn" onclick="setDiscountCustom()">应用</button>
    </div>
</div>

<!-- 添加客户 -->
<div class="add-person-bar" id="addPersonBar" style="display:none">
    <input type="text" id="newPersonName" placeholder="输入客户姓名"
           onkeydown="if(event.key==='Enter')addPerson()">
    <button class="btn btn-primary" onclick="addPerson()">添加客户</button>
</div>

<div id="personList"></div>

<!-- 底部总计 -->
<div class="total-bar" id="totalBar" style="display:none">
    <div class="label">总计</div>
    <div class="amount" id="grandTotal">¥0</div>
    <button class="btn btn-sm btn-green" onclick="showReceipt()">📋账单</button>
</div>

<!-- 账单弹窗 -->
<div class="modal-overlay" id="receiptModal">
    <div class="modal">
        <h2>📋 账单</h2>
        <pre id="receiptText"></pre>
        <div class="modal-btns">
            <button class="btn btn-green" onclick="copyReceipt()">复制</button>
            <button class="btn btn-blue" onclick="closeModal('receiptModal')">关闭</button>
        </div>
    </div>
</div>

<!-- 快照历史弹窗 -->
<div class="modal-overlay" id="snapshotModal">
    <div class="modal">
        <h2>📁 历史快照</h2>
        <div class="save-snap-row">
            <input type="text" id="snapLabelInput" placeholder="快照备注（可选）">
            <button class="btn btn-sm btn-green" onclick="saveSnapshot();closeModal('snapshotModal')">💾保存当前</button>
        </div>
        <div id="snapshotList"></div>
        <div class="modal-btns" style="margin-top:10px">
            <button class="btn btn-blue" onclick="closeModal('snapshotModal')">关闭</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentSessionId = null;
let currentData = null;
let pollTimer = null;
let lastUpdatedAt = '';

const DISCOUNT_PRESETS = [
    {label:'70折', value:70},
    {label:'75折', value:75},
    {label:'80折', value:80},
    {label:'85折', value:85},
    {label:'90折', value:90},
    {label:'全价', value:100},
];

function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.className = 'toast', 2000);
}

function setOnline(online) {
    document.getElementById('onlineDot').style.background = online ? 'var(--green)' : 'var(--danger)';
}

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

window.onload = () => {
    refreshSessionList();
    pollTimer = setInterval(pollUpdate, 2000);
};

async function pollUpdate() {
    if (!currentSessionId) return;
    try {
        const res = await fetch(`/api/sessions/${currentSessionId}`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.updated_at !== lastUpdatedAt) {
            lastUpdatedAt = data.updated_at;
            currentData = data;
            renderData(data);
        }
        setOnline(true);
    } catch(e) { setOnline(false); }
}

async function refreshSessionList() {
    try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const sel = document.getElementById('sessionSelect');
        sel.innerHTML = '<option value="">-- 选择会话 --</option>';
        sessions.forEach(s => {
            sel.innerHTML += `<option value="${s.id}">${s.name} (${s.person_count}人 ¥${s.grand_total})</option>`;
        });
        if (currentSessionId) sel.value = currentSessionId;
        setOnline(true);
    } catch(e) { setOnline(false); }
}

function showNewSession() {
    document.getElementById('newSessionForm').classList.add('open');
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('newSessionName').value = today;
    document.getElementById('newSessionName').focus();
}
function hideNewSession() { document.getElementById('newSessionForm').classList.remove('open'); }

async function createSession() {
    const name = document.getElementById('newSessionName').value.trim();
    if (!name) return;
    const res = await fetch('/api/sessions', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name})
    });
    const data = await res.json();
    currentSessionId = data.id;
    currentData = data;
    lastUpdatedAt = data.updated_at;
    hideNewSession();
    await refreshSessionList();
    renderData(data);
    toast('会话已创建');
}

async function loadSession() {
    currentSessionId = document.getElementById('sessionSelect').value;
    if (!currentSessionId) {
        document.getElementById('personList').innerHTML = '';
        document.getElementById('totalBar').style.display = 'none';
        document.getElementById('discountBar').style.display = 'none';
        document.getElementById('addPersonBar').style.display = 'none';
        return;
    }
    const res = await fetch(`/api/sessions/${currentSessionId}`);
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
}

async function deleteSession() {
    if (!currentSessionId) return;
    if (!confirm('确定删除此会话？所有数据和快照将删除！')) return;
    await fetch(`/api/sessions/${currentSessionId}`, {method:'DELETE'});
    currentSessionId = null; currentData = null;
    await refreshSessionList();
    document.getElementById('personList').innerHTML = '';
    document.getElementById('totalBar').style.display = 'none';
    document.getElementById('discountBar').style.display = 'none';
    document.getElementById('addPersonBar').style.display = 'none';
    toast('会话已删除');
}

async function resetSession() {
    if (!currentSessionId) return;
    if (!confirm('确定重置？数据将自动备份，可点击「恢复」找回！')) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/reset`, {method:'POST'});
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    toast('已重置，可点「恢复」找回数据', 'warn');
}

async function restoreBackup() {
    if (!currentSessionId) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/restore`, {method:'POST'});
    if (!res.ok) {
        const err = await res.json();
        toast(err.error || '恢复失败', 'error');
        return;
    }
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
    toast('数据已恢复！');
}

// ============ 折扣 ============

function renderDiscountChips(currentDiscount) {
    const container = document.getElementById('discountChips');
    const currentPct = Math.round(currentDiscount * 100);
    container.innerHTML = DISCOUNT_PRESETS.map(p =>
        `<span class="discount-chip${p.value === currentPct ? ' active' : ''}" 
              onclick="setDiscount(${p.value})">${p.label}</span>`
    ).join('');
    document.getElementById('discountInput').value = currentPct;
}

async function setDiscount(pct) {
    if (!currentSessionId) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/discount`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({discount: pct})
    });
    const data = await res.json();
    currentData = data;
    lastUpdatedAt = data.updated_at;
    renderData(data);
}

async function setDiscountCustom() {
    const val = parseInt(document.getElementById('discountInput').value);
    if (val >= 1 && val <= 100) await setDiscount(val);
}

// ============ 渲染 ============

function renderData(data) {
    renderDiscountChips(data.discount);
    document.getElementById('discountBar').style.display = 'flex';
    document.getElementById('addPersonBar').style.display = 'flex';
    document.getElementById('totalBar').style.display = 'flex';
    document.getElementById('grandTotal').textContent = `¥${data.grand_total}`;

    // 恢复按钮
    const restoreBtn = document.getElementById('restoreBtn');
    restoreBtn.style.display = data.has_backup ? 'inline-block' : 'none';

    const list = document.getElementById('personList');
    if (!data.persons || data.persons.length === 0) {
        list.innerHTML = '<div class="empty"><div class="icon">👤</div>添加客户开始计价</div>';
        return;
    }

    const discountPct = Math.round(data.discount * 100);
    list.innerHTML = data.persons.map(p => `
        <div class="person-card">
            <div class="person-header" onclick="togglePerson(${p.id})">
                <span class="name">${esc(p.name)}</span>
                <span class="total">¥${p.total}</span>
                <span class="toggle" id="toggle-${p.id}">▼</span>
            </div>
            <div class="person-body" id="body-${p.id}">
                <div class="section-title">🕐 卡钟（${discountPct}%折扣）</div>
                <div class="fee-tags">
                    ${p.clock_fees.map(c => `<span class="fee-tag">${c.fee}<span class="del" onclick="removeClock(${p.id},${c.id})">✕</span></span>`).join('')}
                </div>
                <div class="add-row">
                    <input type="number" id="clock-input-${p.id}" placeholder="金额" step="0.01"
                           onkeydown="if(event.key==='Enter')addClock(${p.id})">
                    <button class="btn btn-sm btn-green" onclick="addClock(${p.id})">添加</button>
                </div>
                <div class="subtotal">
                    卡钟合计：<span>¥${p.clock_total}</span> → ${discountPct}%折：<span class="gold">¥${p.clock_discounted}</span>
                </div>

                <div class="section-title">🍺 额外消费（原价）</div>
                <div class="fee-tags">
                    ${p.extra_items.map(e => `<span class="extra-tag">${esc(e.name)} ¥${e.price}<span class="del" onclick="removeExtra(${p.id},${e.id})">✕</span></span>`).join('')}
                </div>
                <div class="add-row">
                    <input type="text" id="extra-name-${p.id}" placeholder="名称" style="flex:1">
                    <input type="number" id="extra-price-${p.id}" placeholder="金额" class="small" step="0.01"
                           onkeydown="if(event.key==='Enter')addExtra(${p.id})">
                    <button class="btn btn-sm btn-gold" onclick="addExtra(${p.id})">添加</button>
                </div>
                ${p.extra_items.length ? `<div class="subtotal">额外小计：<span class="gold">¥${p.extra_total}</span></div>` : ''}

                <div style="margin-top:10px;text-align:right">
                    <button class="btn btn-sm btn-danger" onclick="removePerson(${p.id})">删除 ${esc(p.name)}</button>
                </div>
            </div>
        </div>
    `).join('');
}

function togglePerson(pid) {
    const body = document.getElementById(`body-${pid}`);
    const toggle = document.getElementById(`toggle-${pid}`);
    body.classList.toggle('open');
    toggle.classList.toggle('open');
}

// ============ CRUD ============

async function addPerson() {
    if (!currentSessionId) return;
    const name = document.getElementById('newPersonName').value.trim();
    if (!name) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name})
    });
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    document.getElementById('newPersonName').value = '';
    await refreshSessionList();
}

async function removePerson(pid) {
    if (!confirm('确定删除此客户？')) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}`, {method:'DELETE'});
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function addClock(pid) {
    const input = document.getElementById(`clock-input-${pid}`);
    const fee = parseFloat(input.value);
    if (!fee || fee <= 0) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/clock`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({fee})
    });
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function removeClock(pid, cid) {
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/clock/${cid}`, {method:'DELETE'});
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function addExtra(pid) {
    const name = document.getElementById(`extra-name-${pid}`).value.trim();
    const price = parseFloat(document.getElementById(`extra-price-${pid}`).value);
    if (!name || !price || price <= 0) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/extra`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, price})
    });
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

async function removeExtra(pid, eid) {
    const res = await fetch(`/api/sessions/${currentSessionId}/persons/${pid}/extra/${eid}`, {method:'DELETE'});
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    await refreshSessionList();
}

// ============ 账单 ============

async function showReceipt() {
    if (!currentSessionId) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/receipt`);
    const data = await res.json();
    document.getElementById('receiptText').textContent = data.receipt;
    document.getElementById('receiptModal').classList.add('open');
}

function copyReceipt() {
    navigator.clipboard.writeText(document.getElementById('receiptText').textContent)
        .then(() => toast('已复制'));
}

// ============ 快照 ============

async function saveSnapshot() {
    if (!currentSessionId) return;
    const label = document.getElementById('snapLabelInput')?.value?.trim() || '';
    const res = await fetch(`/api/sessions/${currentSessionId}/snapshots`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({label})
    });
    const data = await res.json();
    toast(`已保存快照：${data.label}`);
    // 清空输入
    const inp = document.getElementById('snapLabelInput');
    if (inp) inp.value = '';
}

async function showSnapshots() {
    if (!currentSessionId) { toast('请先选择会话', 'warn'); return; }
    const res = await fetch(`/api/sessions/${currentSessionId}/snapshots`);
    const snapshots = await res.json();
    const container = document.getElementById('snapshotList');
    if (snapshots.length === 0) {
        container.innerHTML = '<div class="empty" style="padding:20px"><div class="icon">📁</div>暂无快照<br>点击「💾保存当前」保存当前数据</div>';
    } else {
        container.innerHTML = snapshots.map(s => `
            <div class="snap-item">
                <div class="snap-info">
                    <div class="snap-label">${esc(s.label)}</div>
                    <div class="snap-meta">${s.created_at} | ${s.person_count}人</div>
                </div>
                <div class="snap-total">¥${s.grand_total}</div>
                <button class="btn btn-sm btn-green" onclick="restoreSnapshot(${s.id})">恢复</button>
                <button class="btn btn-sm btn-danger" onclick="deleteSnapshot(${s.id})">删除</button>
            </div>
        `).join('');
    }
    document.getElementById('snapshotModal').classList.add('open');
}

async function restoreSnapshot(snapId) {
    if (!confirm('恢复此快照将覆盖当前数据，确定？')) return;
    const res = await fetch(`/api/sessions/${currentSessionId}/snapshots/${snapId}/restore`, {method:'POST'});
    const data = await res.json();
    currentData = data; lastUpdatedAt = data.updated_at;
    renderData(data);
    closeModal('snapshotModal');
    toast('快照已恢复！');
    await refreshSessionList();
}

async function deleteSnapshot(snapId) {
    if (!confirm('确定删除此快照？')) return;
    await fetch(`/api/sessions/${currentSessionId}/snapshots/${snapId}`, {method:'DELETE'});
    showSnapshots(); // 刷新列表
}

function closeModal(id) {
    document.getElementById(id).classList.remove('open');
}

// 点击遮罩关闭
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => {
        if (e.target === el) el.classList.remove('open');
    });
});
</script>
